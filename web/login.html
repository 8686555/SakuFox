<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SakuFox Login</title>
  <link rel="stylesheet" href="/web/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
  <main class="login-card">
    <div class="login-header">
      <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <h1>SakuFox</h1>
      <p class="login-subtitle">Sign in with your enterprise identity</p>
    </div>

    <form id="ldapLoginForm" class="login-form">
      <input id="usernameInput" name="username" autocomplete="username" placeholder="Username" />
      <input id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="Password" />
      <button class="btn btn-primary btn-block" type="submit">
        <i class="fa-solid fa-right-to-bracket"></i> LDAP Login
      </button>
    </form>

    <div id="oauthProviders" class="login-controls"></div>
    <div id="loginMessage" class="login-footer"></div>
  </main>

  <script src="/web/login.js"></script>
</body>
</html>
